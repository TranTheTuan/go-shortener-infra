apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        # Rollout lại Pod khi nội dung ConfigMap thay đổi
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
      - name: {{ .Release.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: {{ .Values.server.port }}
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.db.existingSecretName }}
              key: {{ .Values.db.existingSecretKey }}
        - name: SHORTENER_API_KEYS
        {{- if .Values.shortener.apiKeysSecretName }}
          valueFrom:
            secretKeyRef:
              name: {{ .Values.shortener.apiKeysSecretName }}
              key: {{ .Values.shortener.apiKeysSecretKey }}
        {{- else }}
          value: {{ .Values.shortener.apiKeys | quote }}
        {{- end }}
        - name: REDIS_PASSWORD
        {{- if .Values.redis.existingSecretName }}
          valueFrom:
            secretKeyRef:
              name: {{ .Values.redis.existingSecretName }}
              key: {{ .Values.redis.existingSecretKey }}
        {{- else }}
          value: ""
        {{- end }}
