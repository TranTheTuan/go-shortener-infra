apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        # Rollout lại Pod khi nội dung ConfigMap thay đổi
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
      - name: {{ .Release.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: {{ .Values.server.port }}
        {{- if .Values.metrics.enabled }}
        - name: metrics
          containerPort: {{ .Values.metrics.port }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.db.existingSecretName }}
              key: {{ .Values.db.existingSecretKey }}
        - name: REDIS_PASSWORD
        {{- if .Values.redis.existingSecretName }}
          valueFrom:
            secretKeyRef:
              name: {{ .Values.redis.existingSecretName }}
              key: {{ .Values.redis.existingSecretKey }}
        {{- else }}
          value: ""
        {{- end }}
        - name: KAFKA_SASL_PASSWORD
        {{- if .Values.kafka.existingSecretName }}
          valueFrom:
            secretKeyRef:
              name: {{ .Values.kafka.existingSecretName }}
              key: {{ .Values.kafka.existingSecretKey }}
        {{- else }}
          value: ""
        {{- end }}
        - name: R2_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.r2.existingSecretName }}
              key: {{ .Values.r2.accessKeyIDKey }}
        - name: R2_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.r2.existingSecretName }}
              key: {{ .Values.r2.secretAccessKeyKey }}
        - name: PADDLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.paddle.existingSecretName }}
              key: {{ .Values.paddle.apiKeyKey }}
        - name: PADDLE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.paddle.existingSecretName }}
              key: {{ .Values.paddle.webhookSecretKey }}
