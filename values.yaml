replicaCount: 2
image:
  repository: 22009988/go-shortener
  tag: sha-2fdb580
ingress:
  host: go-short.tonytran.xyz
# Application
# Tương ứng biến ENV (development | production)
env: production
# HTTP server (tiền tố SERVER_)
server:
  port: 8080
  readTimeout: 5s
  writeTimeout: 10s
  idleTimeout: 120s
  shutdownTimeout: 10s
  # Địa chỉ pprof debug server. Rỗng = tắt. Trong K8s chỉ bind loopback (kubectl port-forward để truy cập).
  pprofAddr: "localhost:6060"
# Prometheus metrics (OTel + Prometheus exporter, tiền tố SERVER_METRICS_)
metrics:
  enabled: true
  port: 9464
  path: /metrics
  interval: 30s
  # Helm release name của kube-prometheus-stack — ServiceMonitor BẮT BUỘC mang
  # label `release: <giá trị này>`, nếu không Prometheus (selector mặc định) bỏ qua.
  prometheusRelease: proxy-monitor
# PostgreSQL (tiền tố DB_)
db:
  # Host chính là tên Service của Postgres trong K8s.
  # Cú pháp chuẩn: <tên-service>.<namespace>.svc.cluster.local
  host: "hdp-db-rw.default.svc.cluster.local"
  port: 5432
  user: "admin"
  name: "hdp"
  sslMode: "disable"
  timeZone: "UTC"
  maxOpenConns: 40
  maxIdleConns: 40
  connMaxLifetime: "5m"
  # Chỉ định tên Secret và Key mà Helm Postgres đã tạo sẵn (cho DB_PASSWORD)
  existingSecretName: "hdp-db-secret"
  existingSecretKey: "password"
# Redis (tiền tố REDIS_)
redis:
  # Host chính là tên Service của Redis trong K8s.
  # Cú pháp chuẩn: <tên-service>.<namespace>.svc.cluster.local
  host: "redis-cache-master.default.svc.cluster.local"
  port: 6379
  db: 0
  poolSize: 300
  minIdleConns: 100
  # Khi existingSecretName rỗng, Redis kết nối không cần password.
  existingSecretName: "redis-secret"
  existingSecretKey: "redis-password"
# URL shortener (tiền tố SHORTENER_)
shortener:
  # Origin công khai dùng để build short URL (nên khớp với ingress.host)
  baseURL: "https://go-short.tonytran.xyz"
  codeLength: 7
  cacheTTL: "24h"
  # Danh sách API key (phân tách bằng dấu phẩy) nhận trên header X-API-Key.
  # Production nên dùng Secret: set apiKeysSecretName + apiKeysSecretKey thay vì
  # để key ở đây. Khi apiKeysSecretName rỗng, giá trị apiKeys dưới đây được dùng.
  apiKeys: "dev-key-1,dev-key-2"
  apiKeysSecretName: ""
  apiKeysSecretKey: "api-keys"
# Authentication — Keycloak OIDC (tiền tố KEYCLOAK_; app chỉ validate token)
keycloak:
  # ISSUER: token issuer CÔNG KHAI; phải khớp đúng `iss` trong access token.
  issuer: "https://auth.tonytran.xyz/realms/nine-realms"
  # JWKS_URL: endpoint certs IN-CLUSTER (host nội bộ + path chuẩn của Keycloak).
  # Thêm port của service nếu khác 80.
  jwksURL: "http://keycloak-keycloakx-http.keycloak.svc.cluster.local/realms/nine-realms/protocol/openid-connect/certs"
  # CLIENT_ID: client mong đợi; token phải có trong `aud` hoặc `azp`. Rỗng = bỏ qua.
  clientID: "go-shortener"
# Daily link quota (tiền tố QUOTA_; hạn mức tạo link/ngày cho mỗi user)
quota:
  defaultPlanCode: "basic"
  basicFallbackLimit: 10
  breakerMaxFailures: 10
  breakerOpenTimeout: "5m"
# Analytics consumer (chạy mode "analyze" — cùng image với server, không có HTTP port)
consumer:
  enabled: true
  replicaCount: 1 # tăng nếu topic có nhiều partition; franz-go tự rebalance
# Bulk-job worker (chạy mode "bulk-worker" — tải file R2, shorten, ghi kết quả)
bulkWorker:
  enabled: true
  replicaCount: 1 # tăng nếu bulkJobTopic có nhiều partition
# Kafka (tiền tố KAFKA_; click-analytics + bulk-job producer/consumer)
kafka:
  brokers: "kafka1.tonytran.xyz:9093,kafka2.tonytran.xyz:9093,kafka3.tonytran.xyz:9093"
  clickTopic: "link-clicks"
  consumerGroup: "click-consumer"
  bulkJobTopic: "bulk-link-jobs"
  bulkConsumerGroup: "bulk-job-consumer"
  saslMechanism: "SCRAM-SHA-256"
  saslUsername: "app-consumer"
  tlsEnabled: true
  existingSecretName: "kafka-secret"
  existingSecretKey: "sasl-password"
# OpenTelemetry tracing (tiền tố TRACING_; OTLP -> Alloy DaemonSet -> Tempo)
tracing:
  enabled: true
  # OTLP gRPC endpoint = Alloy forwarder trong namespace monitoring.
  otlpEndpoint: "alloy.monitoring.svc.cluster.local:4317"
  # 1.0 = giữ mọi trace (traffic thật thấp). Hạ xuống chỉ khi load test.
  sampleRatio: 1.0
# Cloudflare R2 (tiền tố R2_; lưu file bulk upload). Endpoint suy ra từ accountID.
# Khi accountID/accessKey rỗng, các route /api/bulk-jobs không được đăng ký.
r2:
  accountID: "30b8eb0776668c8dbe40691090d5f897"
  bucket: "url-sheets"
  # Access key ID + secret access key lấy từ Secret có sẵn (không đặt ở đây).
  existingSecretName: "r2-secret"
  accessKeyIDKey: "access-key-id"
  secretAccessKeyKey: "secret-access-key"
# Paddle Billing (tiền tố PADDLE_; bật khi enabled=true)
paddle:
  enabled: true
  clientToken: "test_9b1cd6bdab4392a3cd075b25ccd"
  baseURL: "https://api.paddle.com"
  existingSecretName: "paddle-secret"
  apiKeyKey: "api-key"
  webhookSecretKey: "webhook-secret"
